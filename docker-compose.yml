services:
  mpvm-client:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      MPVM_DATABASE_URL: "${MPVM_DATABASE_URL:-postgresql://mpvm:mpvm@postgres:5432/mpvm}"
      MPVM_ASSET_CARD_REQUEST_WORKERS: "${MPVM_ASSET_CARD_REQUEST_WORKERS:-8}"
      MPVM_ASSET_CARD_REFRESH_WORKERS: "${MPVM_ASSET_CARD_REFRESH_WORKERS:-3}"
      MPVM_SCAN_POSTPROCESS_WORKERS: "${MPVM_SCAN_POSTPROCESS_WORKERS:-3}"
      MPVM_SCAN_ASSET_PROCESS_WORKERS: "${MPVM_SCAN_ASSET_PROCESS_WORKERS:-1}"
      MPVM_DOCKER_DYNAMIC_GROUP_ITERATIONS: "${MPVM_DOCKER_DYNAMIC_GROUP_ITERATIONS:-3}"
      MPVM_DOCKER_DYNAMIC_GROUP_SETTLE_SECONDS: "${MPVM_DOCKER_DYNAMIC_GROUP_SETTLE_SECONDS:-10}"
      MPVM_DOCKER_DYNAMIC_GROUP_TIMEOUT_SECONDS: "${MPVM_DOCKER_DYNAMIC_GROUP_TIMEOUT_SECONDS:-120}"
      MPVM_DOCKER_DYNAMIC_GROUP_POLL_SECONDS: "${MPVM_DOCKER_DYNAMIC_GROUP_POLL_SECONDS:-5}"
      MPVM_DOCKER_DYNAMIC_GROUP_RETENTION_SECONDS: "${MPVM_DOCKER_DYNAMIC_GROUP_RETENTION_SECONDS:-600}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./exports:/app/exports
      - ./output:/app/output
    restart: unless-stopped

  postgres:
    # The persistent project volume was initialized by PostgreSQL 16.
    # A major-version upgrade requires pg_upgrade and must not happen implicitly.
    image: postgres:16-alpine
    ports:
      - "55432:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-mpvm}"
      POSTGRES_USER: "${POSTGRES_USER:-mpvm}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-mpvm}"
      PGDATA: /var/lib/postgresql/data
    volumes:
      - mpvm_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  mpvm_postgres:
